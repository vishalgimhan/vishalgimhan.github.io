---
layout: default
---

<article>
  <header style="margin-bottom: 2em;">
    <h1>{{ page.title }}</h1>
    <p style="color: grey;">
      {{ page.date | date: "%B %d, %Y" }}
      {% if page.tags %}
        · {% for tag in page.tags %}<span style="background:#f0f0f0; padding: 2px 8px; border-radius: 4px; margin-right: 4px; font-size:0.85em;">{{ tag }}</span>{% endfor %}
      {% endif %}
    </p>
    {% if page.header.image %}
      <img src="{{ page.header.image }}" style="width:100%; border-radius: 8px; margin-bottom: 1em;">
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>
